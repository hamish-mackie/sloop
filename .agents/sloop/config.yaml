version: 1
worktree_dir: .worktrees

scheduler:
  max_parallel_tasks: 2

agent:
  default_target: opencode
  targets:
    claude:
      cmd:
        - claude
        - --print
        - --model
        - "{model}"
        - --effort
        - "{effort}"
        - "{prompt}"
    opencode:
      cmd:
        - opencode
        - run
        - --model
        - "{model}"
        - --variant
        - "{effort}"
        - "{prompt}"
    codex:
      cmd:
        - codex
        - exec
        - --model
        - "{model}"
        - --config
        - 'model_reasoning_effort="{effort}"'
        - --sandbox
        - workspace-write
        - --ephemeral
        - "{prompt}"
