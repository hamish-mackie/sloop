version: 1
worktree_dir: .worktrees
worktree_retention: 7d

agent:
  default_target: claude
  targets:
    claude:
      model: opus
      effort: high
      cmd:
        - claude
        - --print
        - --model
        - "{model}"
        - --effort
        - "{effort}"
        - "{prompt}"
    codex:
      model: gpt-5.6-sol
      effort: high
      cmd:
        - codex
        - exec
        - --model
        - "{model}"
        - --config
        - 'model_reasoning_effort="{effort}"'
        - --sandbox
        - workspace-write
        - --ephemeral
        - "{prompt}"
    # OpenCode model names are provider-qualified (for example
    # anthropic/claude-opus-4-8), so pick yours here or per ticket.
    opencode:
      cmd:
        - opencode
        - run
        - --model
        - "{model}"
        - --variant
        - "{effort}"
        - "{prompt}"
